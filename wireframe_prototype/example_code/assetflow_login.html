<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AssetFlow ERP - Login</title>
<!-- Google Fonts: Inter -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols Outlined -->

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                    "on-primary-fixed": "#001b3b",
                    "inverse-on-surface": "#f2f0f0",
                    "surface-container": "#efeded",
                    "tertiary": "#923f00",
                    "secondary-fixed-dim": "#a4c9ff",
                    "on-secondary": "#ffffff",
                    "tertiary-container": "#b85203",
                    "error-container": "#ffdad6",
                    "inverse-primary": "#a7c8ff",
                    "on-secondary-fixed": "#001c39",
                    "inverse-surface": "#303031",
                    "surface": "#fbf9f9",
                    "tertiary-fixed": "#ffdbca",
                    "outline-variant": "#d8dde6",
                    "secondary": "#005fac",
                    "on-secondary-container": "#003665",
                    "primary-container": "#0070d2",
                    "outline": "#717784",
                    "on-tertiary": "#ffffff",
                    "primary-fixed": "#d5e3ff",
                    "on-tertiary-fixed": "#331100",
                    "surface-bright": "#fbf9f9",
                    "on-tertiary-fixed-variant": "#773200",
                    "error": "#ba1a1a",
                    "on-error": "#ffffff",

                    "surface-container-lowest": "#ffffff",
                    "secondary-fixed": "#d4e3ff",
                    "on-primary": "#ffffff",

                    "surface-container-highest": "#e3e2e2",
                    "surface-container-low": "#f5f3f3",
                    "surface-dim": "#dbdad9",
                    "tertiary-fixed-dim": "#ffb68f",

                    "primary-fixed-dim": "#a7c8ff",
                    "on-secondary-fixed-variant": "#004884",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F3F3F3;
        }
        .login-card {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid #D8DDE6;
        }
        .input-focus-ring:focus {
            outline: none;
            border-color: #0058a7;
            box-shadow: 0 0 0 2px rgba(0, 88, 167, 0.1);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-margin-page">
<!-- Subtle Background Shader (Atmospheric Effect) -->

<main class="relative z-10 w-full max-w-[420px]">
<!-- Login Container -->
<div class="login-card bg-surface-container-lowest p-xl rounded-lg">
<!-- Branding Header -->
<div class="flex flex-col items-center mb-xl">
<div class="w-16 h-16 bg-primary-container rounded-full flex items-center justify-center mb-md">
<span class="font-headline-lg text-headline-lg text-on-primary-container tracking-tighter">AF</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface">AssetFlow ERP</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-xs">Enterprise Supply Chain Management</p>
</div>
<!-- Login Form -->
<form action="#" class="space-y-md" onsubmit="event.preventDefault();">
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs" for="email">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">mail</span>
<input class="w-full h-10 pl-10 pr-md border border-outline-variant rounded bg-surface-container-lowest font-body-md text-body-md input-focus-ring transition-all" id="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<div>
<div class="flex justify-between items-center mb-xs">
<label class="block font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:underline" href="#">Forgot password</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">lock</span>
<input class="w-full h-10 pl-10 pr-md border border-outline-variant rounded bg-surface-container-lowest font-body-md text-body-md input-focus-ring transition-all" id="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<div class="flex items-center space-x-sm pt-xs">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary-container" id="remember" type="checkbox"/>
<label class="font-body-sm text-body-sm text-on-surface" for="remember">Keep me signed in</label>
</div>
<button class="w-full h-10 bg-primary text-on-primary font-label-md text-label-md rounded hover:bg-primary-container transition-colors active:opacity-80 flex items-center justify-center gap-sm" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center my-xl">
<div class="flex-grow h-[1px] bg-outline-variant"></div>
<span class="px-md font-label-sm text-label-sm text-outline uppercase tracking-wider">New here?</span>
<div class="flex-grow h-[1px] bg-outline-variant"></div>
</div>
<!-- Onboarding Section -->
<div class="bg-surface-container-low p-md rounded border border-dashed border-outline-variant text-center mb-md">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Sign up creates an employee account. 
                    <span class="block mt-1 italic opacity-75">Admin roles assigned later by organization head.</span>
</p>
</div>
<button class="w-full h-10 border border-primary text-primary font-label-md text-label-md rounded hover:bg-surface-container-high transition-colors active:bg-surface-container-highest" type="button">
                Create Account
            </button>
</div>
<!-- Footer Links -->
<footer class="mt-xl flex justify-center space-x-lg">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Service Agreement</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Contact Support</a>
</footer>
</main>
<!-- Visual Accent Element (Subtle Glassmorphism Card Behind) -->
<div class="fixed -bottom-10 -right-10 w-64 h-64 bg-primary opacity-5 rounded-full blur-[100px] pointer-events-none"></div>
<div class="fixed -top-10 -left-10 w-96 h-96 bg-secondary opacity-5 rounded-full blur-[120px] pointer-events-none"></div>
<script>
        // Micro-interaction: Login button feedback
        const loginBtn = document.querySelector('button[type="submit"]');
        loginBtn.addEventListener('click', () => {
            if(document.getElementById('email').value && document.getElementById('password').value) {
                loginBtn.innerHTML = `
                    <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    Authenticating...
                `;
                setTimeout(() => {
                    loginBtn.innerHTML = `Sign In <span class="material-symbols-outlined text-[18px]">arrow_forward</span>`;
                }, 2000);
            }
        });
    </script>
</body></html>
